name: IPTV云端自动更新（只改端口版）
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  scan_and_update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: 安装nmap
        run: |
          sudo apt-get update
          sudo apt-get install -y nmap

      - name: 读取当前端口（只取端口号）
        id: read_old_port
        run: |
          OLD=$(grep -oP '171\.213\.158\.140:\K\d+' test.m3u | head -1)
          echo "OLD_PORT=$OLD" >> $GITHUB_ENV

      - name: 扫描开放端口
        id: scan
        run: |
          IP="171.213.158.140"
          NEW=$(nmap -sU -p1-9999 --open --host-timeout 5s $IP -oG - | awk '/Host:/{for(i=1;i<=NF;i++) if($i~"/open/"){split($i,a,"/"); print a[1]; exit}}')
          if [ -z "$NEW" ]; then
            echo "❌ 未发现新端口，不修改文件"
            exit 0
          fi
          echo "✅ 扫描到新端口: $NEW"
          echo "NEW_PORT=$NEW" >> $GITHUB_ENV

      - name: 仅在端口变化时更新文件（只改端口，不动IP）
        if: env.NEW_PORT != env.OLD_PORT
        run: |
          sed -i "s|\(171\.213\.158\.140:\)[0-9]\+|\1${{ env.NEW_PORT }}|g" test.m3u
          echo "✅ 已将所有端口更新为: ${{ env.NEW_PORT }}"

      - name: 提交更新
        if: env.NEW_PORT != env.OLD_PORT
        run: |
          git config --global user.name ${{ github.actor }}
          git config --global user.email ${{ github.actor }}@users.noreply.github.com
          git add test.m3u
          git commit -m "auto update port to ${{ env.NEW_PORT }}" || true
          git push
