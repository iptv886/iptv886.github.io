name: IPTV云端自动更新（优化）
on:
  schedule:
    - cron: "0 */6 * * *"   # 每6小时
  workflow_dispatch:

concurrency: iptv-update

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 获取当前端口
        id: old_port
        run: echo "OLD=$(grep -oP '171\.213\.158\.140:\K\d+' test.m3u || true)" >> $GITHUB_ENV

      - name: 扫描新端口
        id: new_port
        run: |
          NEW=$(nmap -sU -p 1-9999 --open --host-timeout 30s 171.213.158.140 -oG - | awk '/Host:/{for(i=1;i<=NF;i++) if($i~"/open/"){split($i,a,"/"); print a[1]; exit}}')
          if [ -z "$NEW" ]; then
            echo "未发现开放端口"
            exit 0
          fi
          echo "NEW=$NEW" >> $GITHUB_ENV

      - name: 更新并推送
        if: env.NEW != env.OLD
        run: |
          sed -i "s|171.213.158.140:[0-9]*|171.213.158.140:${{ env.NEW }}|g" test.m3u
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add test.m3u
          git commit -m "auto update port to ${{ env.NEW }}" || true
          git push
